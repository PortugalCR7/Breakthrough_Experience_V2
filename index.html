<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>BREAKTHROUGH — Frank Mondeose</title>
    <meta
      name="description"
      content="The dojo for men on the cusp of impact. 6 private 1:1 sessions with mentor Frank Mondeose to close the gap between your potential and your reality."
    />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="theme-color" content="#000000" />
    <link rel="canonical" href="https://frankmondeose.com/" />

    <!-- Performance: warm up font origins, then load fonts non-render-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Libre+Bodoni:ital,wght@0,400..700;1,400..700&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Jost:ital,wght@0,100..900;1,100..900&family=IBM+Plex+Mono:ital,wght@0,100..700;1,100..700&display=swap"
    />

    <!-- Performance: preload the LCP hero background (SPA root is empty, so the
         preload scanner can't discover it from markup) -->
    <link
      rel="preload"
      as="image"
      href="/bg_forest.webp"
      type="image/webp"
      fetchpriority="high"
    />

    <!-- Icons / manifest -->
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BREAKTHROUGH" />
    <meta property="og:title" content="BREAKTHROUGH — Frank Mondeose" />
    <meta
      property="og:description"
      content="The dojo for men on the cusp of impact. 6 private 1:1 sessions with mentor Frank Mondeose to close the gap between your potential and your reality."
    />
    <meta property="og:url" content="https://frankmondeose.com/" />
    <meta property="og:locale" content="en_US" />
    <meta
      property="og:image"
      content="https://frankmondeose.com/frank_founder_updated.jpg"
    />
    <meta property="og:image:width" content="923" />
    <meta property="og:image:height" content="1000" />
    <meta property="og:image:alt" content="Frank Mondeose, founder of BREAKTHROUGH" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BREAKTHROUGH — Frank Mondeose" />
    <meta
      name="twitter:description"
      content="The dojo for men on the cusp of impact. 6 private 1:1 sessions with mentor Frank Mondeose to close the gap between your potential and your reality."
    />
    <meta
      name="twitter:image"
      content="https://frankmondeose.com/frank_founder_updated.jpg"
    />
    <meta name="twitter:image:alt" content="Frank Mondeose, founder of BREAKTHROUGH" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://frankmondeose.com/#organization",
            "name": "BREAKTHROUGH",
            "url": "https://frankmondeose.com/",
            "logo": "https://frankmondeose.com/web-app-manifest-512x512.png",
            "description": "The dojo for men on the cusp of impact. Private 1:1 mentorship with Frank Mondeose.",
            "founder": {
              "@type": "Person",
              "name": "Frank Mondeose"
            }
          },
          {
            "@type": "WebSite",
            "@id": "https://frankmondeose.com/#website",
            "url": "https://frankmondeose.com/",
            "name": "BREAKTHROUGH — Frank Mondeose",
            "description": "The dojo for men on the cusp of impact. 6 private 1:1 sessions with mentor Frank Mondeose to close the gap between your potential and your reality.",
            "inLanguage": "en-US",
            "publisher": {
              "@id": "https://frankmondeose.com/#organization"
            }
          },
          {
            "@type": "WebPage",
            "@id": "https://frankmondeose.com/#webpage",
            "url": "https://frankmondeose.com/",
            "name": "BREAKTHROUGH — Frank Mondeose",
            "description": "The dojo for men on the cusp of impact. 6 private 1:1 sessions with mentor Frank Mondeose to close the gap between your potential and your reality.",
            "inLanguage": "en-US",
            "isPartOf": {
              "@id": "https://frankmondeose.com/#website"
            },
            "about": {
              "@id": "https://frankmondeose.com/#organization"
            }
          }
        ]
      }
    </script>
    <!-- No-flash theme guard: set data-theme before first paint. Dark is default. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('bt-theme');
          if (t !== 'light' && t !== 'dark') t = 'dark';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
